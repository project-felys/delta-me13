services:
  vllm:
    image: vllm/vllm-openai:latest
    command: [
      "--model", "/models/PhiLia093-4B-FP8-BLOCK",
      "--max-model-len", "4096",
      "--trust-remote-code",
      "--default-chat-template-kwargs", "{\"enable_thinking\": false}",
      "--limit-mm-per-prompt", "{\"image\":0,\"video\":0}",
      "--max-num-seqs", "32",
      "--gpu-memory-utilization", "0.80",
    ]
    ports:
      - "8000:8000"
    volumes:
      - "E:/Model:/models"
    ipc: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]